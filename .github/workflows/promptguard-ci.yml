name: PromptGuard Regression Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  regression-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server
        env:
          OLLAMA_HOST: 0.0.0.0:11434
        run: |
          OLLAMA_HOST=0.0.0.0:11434 ollama serve &
          sleep 5

      - name: Pull llama3.2 model
        run: ollama pull llama3.2

      - name: Create .env for Docker Compose
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql://promptguard:promptguard@db:5432/promptguard
          REDIS_URL=redis://redis:6379/0
          CELERY_BROKER_URL=redis://redis:6379/0
          CELERY_RESULT_BACKEND=redis://redis:6379/0
          EOF

      - name: Build and start the stack
        run: docker compose up --build -d

      - name: Wait for API to be healthy
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "API failed to become healthy in time"
          docker compose logs
          exit 1

      - name: Seed baseline prompt
        id: baseline_prompt
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/prompts/ \
            -H "Content-Type: application/json" \
            -d '{"version_tag": "ci-baseline", "prompt_text": "You are a concise assistant. Answer in one sentence.", "model_name": "llama3.2"}')
          echo "Response: $RESPONSE"
          PROMPT_ID=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin)['id'])")
          echo "prompt_id=$PROMPT_ID" >> "$GITHUB_OUTPUT"

      - name: Seed candidate prompt
        id: candidate_prompt
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/prompts/ \
            -H "Content-Type: application/json" \
            -d '{"version_tag": "ci-candidate", "prompt_text": "You are a concise assistant. Answer in one sentence.", "model_name": "llama3.2"}')
          echo "Response: $RESPONSE"
          PROMPT_ID=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin)['id'])")
          echo "prompt_id=$PROMPT_ID" >> "$GITHUB_OUTPUT"

      - name: Seed evaluation datasets
        id: datasets
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/datasets/bulk \
            -H "Content-Type: application/json" \
            -d '[
              {"input_query": "What is 2 + 2?", "expected_output": "2 + 2 equals 4."},
              {"input_query": "What is the capital of France?", "expected_output": "The capital of France is Paris."},
              {"input_query": "What colour is the sky?", "expected_output": "The sky is blue."}
            ]')
          echo "Response: $RESPONSE"
          IDS=$(echo "$RESPONSE" | python3 -c "import sys, json; print(','.join(str(d['id']) for d in json.load(sys.stdin)))")
          echo "ids=$IDS" >> "$GITHUB_OUTPUT"

      - name: Run baseline evaluation
        id: run_baseline
        run: |
          DATASET_IDS="[${{ steps.datasets.outputs.ids }}]"
          RESPONSE=$(curl -s -X POST http://localhost:8000/evaluations/run \
            -H "Content-Type: application/json" \
            -d "{\"prompt_id\": ${{ steps.baseline_prompt.outputs.prompt_id }}, \"dataset_ids\": $DATASET_IDS, \"is_baseline\": true}")
          echo "Response: $RESPONSE"
          RUN_ID=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin)['id'])")
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Poll baseline run until COMPLETED
        run: |
          RUN_ID=${{ steps.run_baseline.outputs.run_id }}
          for i in {1..30}; do
            STATUS=$(curl -s http://localhost:8000/evaluations/$RUN_ID | python3 -c "import sys, json; print(json.load(sys.stdin)['status'])")
            echo "Baseline run status: $STATUS ($i/30)"
            if [ "$STATUS" == "COMPLETED" ]; then exit 0; fi
            if [ "$STATUS" == "FAILED" ]; then echo "Baseline run failed"; exit 1; fi
            sleep 5
          done
          echo "Baseline run timed out"
          exit 1

      - name: Mark baseline run as official baseline
        run: |
          curl -s -X PATCH http://localhost:8000/evaluations/${{ steps.run_baseline.outputs.run_id }}/set-baseline

      - name: Run candidate evaluation
        id: run_candidate
        run: |
          DATASET_IDS="[${{ steps.datasets.outputs.ids }}]"
          RESPONSE=$(curl -s -X POST http://localhost:8000/evaluations/run \
            -H "Content-Type: application/json" \
            -d "{\"prompt_id\": ${{ steps.candidate_prompt.outputs.prompt_id }}, \"dataset_ids\": $DATASET_IDS}")
          echo "Response: $RESPONSE"
          RUN_ID=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin)['id'])")
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Poll candidate run until COMPLETED
        run: |
          RUN_ID=${{ steps.run_candidate.outputs.run_id }}
          for i in {1..30}; do
            STATUS=$(curl -s http://localhost:8000/evaluations/$RUN_ID | python3 -c "import sys, json; print(json.load(sys.stdin)['status'])")
            echo "Candidate run status: $STATUS ($i/30)"
            if [ "$STATUS" == "COMPLETED" ]; then exit 0; fi
            if [ "$STATUS" == "FAILED" ]; then echo "Candidate run failed"; exit 1; fi
            sleep 5
          done
          echo "Candidate run timed out"
          exit 1

      - name: Compare candidate against baseline
        id: compare
        run: |
          RESPONSE=$(curl -s "http://localhost:8000/evaluations/compare?baseline_run_id=${{ steps.run_baseline.outputs.run_id }}&candidate_run_id=${{ steps.run_candidate.outputs.run_id }}")
          echo "$RESPONSE" | python3 -m json.tool
          PASSED=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin)['passed'])")
          SUMMARY=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin)['summary'])")
          echo "## PromptGuard Regression Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Result:** $SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$RESPONSE" | python3 -m json.tool >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ "$PASSED" != "True" ]; then
            echo "::error::Regression detected — $SUMMARY"
            exit 1
          fi
          echo "No regression detected — $SUMMARY"

      - name: Show worker logs (always, for debugging)
        if: always()
        run: docker compose logs worker --tail=100

      - name: Tear down
        if: always()
        run: docker compose down -v
